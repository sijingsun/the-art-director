<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Art Director — Style Reference Collection</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0c14;
  --radius: 680px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.layout {
  display: flex;
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* ── LEFT PANEL ── */
.left {
  position: relative;
  z-index: 10;
  width: 320px;
  min-width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 48px;
  padding: 48px 40px;
  pointer-events: none;
  user-select: none;
}

.left-top { display: flex; flex-direction: column; gap: 0; }

.title {
  font-family: "Georgia", "Times New Roman", serif;
  font-size: clamp(56px, 7vw, 88px);
  font-weight: 400;
  line-height: 0.92;
  letter-spacing: -0.03em;
  color: #f0ece4;
}

.divider {
  width: 40px;
  height: 1px;
  background: rgba(240, 236, 228, 0.3);
  margin: 20px 0;
}

.subtitle {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: rgba(240, 236, 228, 0.5);
  text-transform: uppercase;
  line-height: 2;
}

.caption {
  font-size: 11px;
  letter-spacing: 0.06em;
  color: rgba(240, 236, 228, 0.35);
  font-style: italic;
}

.issue {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: rgba(240, 236, 228, 0.25);
  text-transform: uppercase;
}

/* ── DOME GALLERY ── */
.sphere-root {
  position: relative;
  flex: 1;
  height: 100%;
  --radius: 680px;
  --viewer-pad: 72px;
  --segments-x: 35;
  --segments-y: 35;
  --circ: calc(var(--radius) * 3.14);
  --rot-y: calc((360deg / var(--segments-x)) / 2);
  --rot-x: calc((360deg / var(--segments-y)) / 2);
  --item-width: calc(var(--circ) / var(--segments-x));
  --item-height: calc(var(--circ) / var(--segments-y));
  --overlay-blur-color: #0b0c14;
  --tile-radius: 20px;
  --enlarge-radius: 24px;
  --image-filter: none;
}

.sphere-root * { box-sizing: border-box; }

.sphere, .item, .item__image {
  transform-style: preserve-3d;
}

main.sphere-main {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  background: transparent;
  cursor: grab;
}
main.sphere-main:active { cursor: grabbing; }

.stage {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  perspective: calc(var(--radius) * 2);
  perspective-origin: 50% 50%;
  contain: layout paint size;
}

.sphere {
  transform: translateZ(calc(var(--radius) * -1));
  will-change: transform;
}

.overlay, .overlay--blur {
  position: absolute;
  inset: 0;
  margin: auto;
  z-index: 3;
  pointer-events: none;
}

.overlay {
  background-image: radial-gradient(rgba(235,235,235,0) 55%, var(--overlay-blur-color) 100%);
}

.overlay--blur {
  -webkit-mask-image: radial-gradient(rgba(235,235,235,0) 60%, var(--overlay-blur-color) 85%);
  mask-image: radial-gradient(rgba(235,235,235,0) 60%, var(--overlay-blur-color) 85%);
  backdrop-filter: blur(4px);
}

.item {
  width: calc(var(--item-width) * var(--item-size-x));
  height: calc(var(--item-height) * var(--item-size-y));
  position: absolute;
  top: -999px; bottom: -999px; left: -999px; right: -999px;
  margin: auto;
  transform-origin: 50% 50%;
  backface-visibility: hidden;
  transition: transform 300ms;
  transform:
    rotateY(calc(var(--rot-y) * (var(--offset-x) + ((var(--item-size-x) - 1) / 2)) + var(--rot-y-delta, 0deg)))
    rotateX(calc(var(--rot-x) * (var(--offset-y) - ((var(--item-size-y) - 1) / 2)) + var(--rot-x-delta, 0deg)))
    translateZ(var(--radius));
}

.item__image {
  position: absolute;
  display: block;
  inset: 8px;
  border-radius: var(--tile-radius, 12px);
  background: transparent;
  overflow: hidden;
  backface-visibility: hidden;
  transition: transform 300ms;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  pointer-events: auto;
  transform: translateZ(0);
}

.item__image:focus { outline: none; }

.item__image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
  backface-visibility: hidden;
  filter: var(--image-filter, none);
}


/* ── TILE HOVER LABEL ── */
.tile-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 32px 12px 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
  opacity: 0;
  transition: opacity 180ms ease;
  pointer-events: none;
  border-radius: 0 0 var(--tile-radius, 12px) var(--tile-radius, 12px);
}
.item__image:hover .tile-label { opacity: 1; }
.tile-label-num {
  font-size: 8px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 2px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.tile-label-name {
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.95);
  line-height: 1.2;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ── ENLARGED CAPTION ── */
.enlarge-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 48px 24px 24px;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.3) 65%, transparent 100%);
  pointer-events: none;
  animation: caption-in 300ms ease both;
  animation-delay: 80ms;
}
@keyframes caption-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.enlarge-caption-num {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.enlarge-caption-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: rgba(255,255,255,0.97);
  line-height: 1.15;
  margin-bottom: 8px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.enlarge-caption-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.04em;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.edge-fade {
  position: absolute; left: 0; right: 0;
  height: 140px; z-index: 5; pointer-events: none;
  background: linear-gradient(to bottom, transparent, var(--overlay-blur-color));
}
.edge-fade--top { top: 0; transform: rotate(180deg); }
.edge-fade--bottom { bottom: 0; }

.viewer {
  position: absolute; inset: 0;
  z-index: 20; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  padding: var(--viewer-pad);
}

.viewer .frame {
  height: 100%; aspect-ratio: 1;
  border-radius: var(--enlarge-radius, 32px);
  display: flex;
}

@media (max-aspect-ratio: 1/1) {
  .viewer .frame { height: auto; width: 100%; }
}

.viewer .scrim {
  position: absolute; inset: 0; z-index: 10;
  background: rgba(0,0,0,0.5);
  pointer-events: none;
  opacity: 0;
  transition: opacity 400ms ease;
  backdrop-filter: blur(4px);
}

.sphere-root[data-enlarging="true"] .viewer .scrim {
  opacity: 1; pointer-events: all;
}

.viewer .enlarge {
  position: absolute; z-index: 30;
  border-radius: var(--enlarge-radius, 32px);
  overflow: hidden;
  transition: transform 300ms ease, opacity 300ms ease;
  transform-origin: top left;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.viewer .enlarge img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: var(--image-filter, none);
}

.enlarge-closing img {
  filter: var(--image-filter, none);
}

/* ── TOOLTIP ── */
.img-tooltip { display: none; }

.dg-scroll-lock { overflow: hidden; }
</style>
</head>

<div class="layout">

  <!-- LEFT PANEL -->
  <aside class="left">
    <div class="left-top">
      <h1 class="title">The<br>Art<br>Director</h1>
      <div class="divider"></div>
      <div class="subtitle">18 Poster Styles<br>Style Reference Collection</div>
      <div style="height:12px"></div>
      <div class="caption">A curated library of graphic<br>design aesthetics for AI generation.</div>
    </div>
    <div class="issue">No. 001</div>
  </aside>

  <!-- DOME GALLERY -->
  <div class="sphere-root" id="sphereRoot">
    <main class="sphere-main" id="sphereMain">
      <div class="stage">
        <div class="sphere" id="sphere"></div>
      </div>
      <div class="overlay"></div>
      <div class="overlay overlay--blur"></div>
      <div class="edge-fade edge-fade--top"></div>
      <div class="edge-fade edge-fade--bottom"></div>
      <div class="viewer" id="viewer">
        <div class="scrim" id="scrim"></div>
        <div class="frame" id="frame"></div>
      </div>
    </main>
  </div>

</div>

// ── CONFIG ──
const CFG = {
  segments: 35,
  minRadius: 600,
  fit: 0.65,
  padFactor: 0.2,
  maxVerticalRotationDeg: 6,
  dragSensitivity: 22,
  enlargeTransitionMs: 300,
  dragDampening: 2,
  openedImageWidth: '320px',
  openedImageHeight: '420px',
  imageBorderRadius: '20px',
  openedImageBorderRadius: '24px',
  grayscale: false,
  overlayBlurColor: '#0b0c14',
};

// ── HELPERS ──
const clamp = (v, min, max) => Math.min(Math.max(v, min), max);
const normalizeAngle = d => ((d % 360) + 360) % 360;
const wrapAngleSigned = deg => { const a = (((deg + 180) % 360) + 360) % 360; return a - 180; };
const getDataNumber = (el, name, fallback) => {
  const attr = el.dataset[name] ?? el.getAttribute('data-' + name);
  const n = attr == null ? NaN : parseFloat(attr);
  return isFinite(n) ? n : fallback;
};

// ── BUILD ITEMS ──
function buildItems(pool, seg) {
  const xCols = Array.from({length: seg}, (_, i) => -37 + i * 2);
  const evenYs = [-4, -2, 0, 2, 4];
  const oddYs  = [-3, -1, 1, 3, 5];
  const coords = xCols.flatMap((x, c) => {
    const ys = c % 2 === 0 ? evenYs : oddYs;
    return ys.map(y => ({x, y, sizeX: 2, sizeY: 2}));
  });
  const totalSlots = coords.length;
  const norm = pool.map(img => typeof img === 'string' ? {src: img, alt: '', num: '', desc: ''} : {src: img.src||'', alt: img.alt||'', num: img.num||'', desc: img.desc||''});
  const used = Array.from({length: totalSlots}, (_, i) => norm[i % norm.length]);
  for (let i = 1; i < used.length; i++) {
    if (used[i].src === used[i-1].src) {
      for (let j = i+1; j < used.length; j++) {
        if (used[j].src !== used[i].src) { [used[i], used[j]] = [used[j], used[i]]; break; }
      }
    }
  }
  return coords.map((c, i) => ({...c, src: used[i].src, alt: used[i].alt, num: used[i].num||"", desc: used[i].desc||""}));
}

function computeItemBaseRotation(offsetX, offsetY, sizeX, sizeY, segments) {
  const unit = 360 / segments / 2;
  return {
    rotateY: unit * (offsetX + (sizeX - 1) / 2),
    rotateX: unit * (offsetY - (sizeY - 1) / 2),
  };
}

// ── STATE ──
let rotX = 0, rotY = 0;
let startRotX = 0, startRotY = 0;
let startX = 0, startY = 0;
let isDragging = false, hasMoved = false;
let inertiaId = null;
let focusedEl = null, originalTilePos = null;
let isOpening = false, openStartedAt = 0;
let lastDragEndAt = 0;
let lockedRadius = CFG.minRadius;
let tooltipTimeout = null;

// ── RADIUS / RESIZE ──
const ro = new ResizeObserver(entries => {
  const cr = entries[0].contentRect;
  const w = Math.max(1, cr.width), h = Math.max(1, cr.height);
  let radius = Math.max(w, h) * CFG.fit;
  radius = Math.max(radius, CFG.minRadius);
  lockedRadius = Math.round(radius);
  const viewerPad = Math.max(8, Math.round(Math.min(w,h) * CFG.padFactor));
  rootEl.style.setProperty('--radius', lockedRadius + 'px');
  rootEl.style.setProperty('--viewer-pad', viewerPad + 'px');
  applyTransform(rotX, rotY);
});
ro.observe(rootEl);

// ── TRANSFORM ──
function applyTransform(x, y) {
  sphereEl.style.transform = `translateZ(calc(var(--radius) * -1)) rotateX(${x}deg) rotateY(${y}deg)`;
}
applyTransform(0, 0);

// ── BUILD SPHERE TILES ──
const items = buildItems(IMAGES, CFG.segments);
items.forEach(it => {
  const div = document.createElement('div');
  div.className = 'item';
  div.dataset.src = it.src;
  div.dataset.alt = it.alt;
  div.dataset.offsetX = it.x;
  div.dataset.offsetY = it.y;
  div.dataset.sizeX   = it.sizeX;
  div.dataset.sizeY   = it.sizeY;
  div.style.setProperty('--offset-x', it.x);
  div.style.setProperty('--offset-y', it.y);
  div.style.setProperty('--item-size-x', it.sizeX);
  div.style.setProperty('--item-size-y', it.sizeY);

  const tile = document.createElement('div');
  tile.className = 'item__image';
  tile.setAttribute('role', 'button');
  tile.setAttribute('tabindex', '0');
  tile.setAttribute('aria-label', it.alt || 'Open image');

  const img = document.createElement('img');
  img.src = it.src;
  img.draggable = false;
  img.alt = it.alt;

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.innerHTML = '<div class="tile-label-num">Style ' + it.num + '</div><div class="tile-label-name">' + it.alt + '</div>';
  tile.appendChild(img);
  tile.appendChild(label);
  div.appendChild(tile);
  div.dataset.styleNum = it.num;
  div.dataset.styleDesc = it.desc;
  sphereEl.appendChild(div);

  tile.addEventListener('click', onTileClick);
  tile.addEventListener('pointerup', onTilePointerUp);


});

// ── DRAG ──
mainEl.addEventListener('pointerdown', onPointerDown, {passive: true});
mainEl.addEventListener('pointermove', onPointerMove, {passive: true});
mainEl.addEventListener('pointerup', onPointerUp, {passive: true});
mainEl.addEventListener('pointercancel', onPointerUp, {passive: true});

function onPointerDown(e) {
  if (focusedEl) return;
  stopInertia();
  isDragging = true;
  hasMoved = false;
  startRotX = rotX; startRotY = rotY;
  startX = e.clientX; startY = e.clientY;
  lastVX = 0; lastVY = 0;
  lastTime = performance.now();
}

let lastVX = 0, lastVY = 0, lastTime = 0;

function onPointerMove(e) {
  if (!isDragging || !mainEl.hasPointerCapture || focusedEl) return;
  const now = performance.now();
  const dt = Math.max(now - lastTime, 1);
  const dxTotal = e.clientX - startX;
  const dyTotal = e.clientY - startY;
  if (!hasMoved && (dxTotal*dxTotal + dyTotal*dyTotal) > 16) hasMoved = true;
  const nextX = clamp(startRotX - dyTotal / CFG.dragSensitivity, -CFG.maxVerticalRotationDeg, CFG.maxVerticalRotationDeg);
  const nextY = wrapAngleSigned(startRotY + dxTotal / CFG.dragSensitivity);
  const dVX = (nextY - rotY) / dt * 16;
  const dVY = (nextX - rotX) / dt * 16;
  lastVX = lastVX * 0.7 + dVX * 0.3;
  lastVY = lastVY * 0.7 + dVY * 0.3;
  lastTime = now;
  rotX = nextX; rotY = nextY;
  applyTransform(rotX, rotY);
}

function onPointerUp(e) {
  if (!isDragging) return;
  isDragging = false;
  if (hasMoved) {
    lastDragEndAt = performance.now();
    startInertia(lastVX, lastVY);
  }
  hasMoved = false;
}

// ── INERTIA ──
function stopInertia() {
  if (inertiaId) { cancelAnimationFrame(inertiaId); inertiaId = null; }
}

function startInertia(vx, vy) {
  const d = clamp(CFG.dragDampening, 0, 1);
  const friction = 0.93 + 0.055 * d;
  const stop = 0.015 - 0.01 * d;
  const maxF = Math.round(90 + 270 * d);
  let frames = 0;
  let vX = clamp(vx, -80, 80);
  let vY = clamp(vy, -80, 80);
  const step = () => {
    vX *= friction; vY *= friction;
    if (Math.abs(vX) < stop && Math.abs(vY) < stop) { inertiaId = null; return; }
    if (++frames > maxF) { inertiaId = null; return; }
    rotY = wrapAngleSigned(rotY + vX);
    rotX = clamp(rotX + vY, -CFG.maxVerticalRotationDeg, CFG.maxVerticalRotationDeg);
    applyTransform(rotX, rotY);
    inertiaId = requestAnimationFrame(step);
  };
  stopInertia();
  inertiaId = requestAnimationFrame(step);
}

// ── OPEN / CLOSE ──
function onTileClick(e) {
  if (isDragging || hasMoved) return;
  if (performance.now() - lastDragEndAt < 100) return;
  if (isOpening) return;
  openItem(e.currentTarget);
}

function onTilePointerUp(e) {
  if (e.pointerType !== 'touch') return;
  if (isDragging || hasMoved) return;
  if (performance.now() - lastDragEndAt < 100) return;
  if (isOpening) return;
  openItem(e.currentTarget);
}

function openItem(el) {
  if (isOpening) return;
  isOpening = true;
  openStartedAt = performance.now();
  focusedEl = el;

  const parent = el.parentElement;
  const offsetX = getDataNumber(parent, 'offsetX', 0);
  const offsetY = getDataNumber(parent, 'offsetY', 0);
  const sizeX   = getDataNumber(parent, 'sizeX', 2);
  const sizeY   = getDataNumber(parent, 'sizeY', 2);
  const parentRot = computeItemBaseRotation(offsetX, offsetY, sizeX, sizeY, CFG.segments);
  const parentY = normalizeAngle(parentRot.rotateY);
  const globalY = normalizeAngle(rotY);
  let dRotY = -(parentY + globalY) % 360;
  if (dRotY < -180) dRotY += 360;
  const dRotX = -parentRot.rotateX - rotX;
  parent.style.setProperty('--rot-y-delta', dRotY + 'deg');
  parent.style.setProperty('--rot-x-delta', dRotX + 'deg');

  const refDiv = document.createElement('div');
  refDiv.className = 'item__image item__image--reference';
  refDiv.style.opacity = '0';
  refDiv.style.transform = `rotateX(${-parentRot.rotateX}deg) rotateY(${-parentRot.rotateY}deg)`;
  parent.appendChild(refDiv);
  void refDiv.offsetHeight;

  const tileR  = refDiv.getBoundingClientRect();
  const mainR  = mainEl.getBoundingClientRect();
  const frameR = frameEl.getBoundingClientRect();

  if (!mainR || !frameR || tileR.width <= 0) {
    isOpening = false; focusedEl = null; parent.removeChild(refDiv); return;
  }

  originalTilePos = {left: tileR.left, top: tileR.top, width: tileR.width, height: tileR.height};
  el.style.visibility = 'hidden';
  el.style.zIndex = 0;
  tooltip.classList.remove('visible');

  const overlay = document.createElement('div');
  overlay.className = 'enlarge';
  overlay.style.cssText = `position:absolute;left:${frameR.left - mainR.left}px;top:${frameR.top - mainR.top}px;width:${frameR.width}px;height:${frameR.height}px;opacity:0;z-index:30;will-change:transform,opacity;transform-origin:top left;transition:transform ${CFG.enlargeTransitionMs}ms ease,opacity ${CFG.enlargeTransitionMs}ms ease;`;
  const rawSrc = parent.dataset.src || el.querySelector('img')?.src || '';
  const img = document.createElement('img');
  img.src = rawSrc;
  overlay.appendChild(img);

  const rawNum  = parent.dataset.styleNum  || '';
  const rawAlt  = parent.dataset.alt       || '';
  const rawDesc = parent.dataset.styleDesc || '';
  const cap = document.createElement('div');
  cap.className = 'enlarge-caption';
  cap.innerHTML =
    '<div class="enlarge-caption-num">Style ' + rawNum + '</div>' +
    '<div class="enlarge-caption-name">' + rawAlt + '</div>' +
    (rawDesc ? '<div class="enlarge-caption-desc">' + rawDesc + '</div>' : '');
  overlay.appendChild(cap);
  viewerEl.appendChild(overlay);

  const tx0 = tileR.left - frameR.left;
  const ty0 = tileR.top  - frameR.top;
  const sx0 = tileR.width  / frameR.width;
  const sy0 = tileR.height / frameR.height;
  overlay.style.transform = `translate(${tx0}px,${ty0}px) scale(${isFinite(sx0)&&sx0>0?sx0:1},${isFinite(sy0)&&sy0>0?sy0:1})`;

  setTimeout(() => {
    if (!overlay.parentElement) return;
    overlay.style.opacity = '1';
    overlay.style.transform = 'translate(0px,0px) scale(1,1)';
    rootEl.setAttribute('data-enlarging', 'true');
  }, 16);

  // resize to desired dimensions
  const onFirst = ev => {
    if (ev.propertyName !== 'transform') return;
    overlay.removeEventListener('transitionend', onFirst);
    const prevT = overlay.style.transition;
    overlay.style.transition = 'none';
    const tw = CFG.openedImageWidth, th = CFG.openedImageHeight;
    overlay.style.width = tw; overlay.style.height = th;
    const nr = overlay.getBoundingClientRect();
    overlay.style.width = frameR.width + 'px'; overlay.style.height = frameR.height + 'px';
    void overlay.offsetWidth;
    overlay.style.transition = `left ${CFG.enlargeTransitionMs}ms ease,top ${CFG.enlargeTransitionMs}ms ease,width ${CFG.enlargeTransitionMs}ms ease,height ${CFG.enlargeTransitionMs}ms ease`;
    const cL = frameR.left - mainR.left + (frameR.width  - nr.width)  / 2;
    const cT = frameR.top  - mainR.top  + (frameR.height - nr.height) / 2;
    requestAnimationFrame(() => {
      overlay.style.left = cL + 'px'; overlay.style.top  = cT + 'px';
      overlay.style.width = tw;       overlay.style.height = th;
    });
  };
  overlay.addEventListener('transitionend', onFirst);
}

scrimEl.addEventListener('click', closeItem);
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeItem(); });

function closeItem() {
  if (performance.now() - openStartedAt < 250) return;
  const el = focusedEl;
  if (!el) return;
  const parent = el.parentElement;
  const overlay = viewerEl.querySelector('.enlarge');
  if (!overlay) return;
  const refDiv = parent.querySelector('.item__image--reference');
  const origPos = originalTilePos;
  if (!origPos) {
    overlay.remove();
    if (refDiv) refDiv.remove();
    parent.style.setProperty('--rot-y-delta', '0deg');
    parent.style.setProperty('--rot-x-delta', '0deg');
    el.style.visibility = ''; el.style.zIndex = 0;
    focusedEl = null;
    rootEl.removeAttribute('data-enlarging');
    isOpening = false;
    return;
  }
  const curR  = overlay.getBoundingClientRect();
  const rootR = rootEl.getBoundingClientRect();
  const origRel  = {left: origPos.left - rootR.left, top: origPos.top - rootR.top, width: origPos.width, height: origPos.height};
  const overlRel = {left: curR.left  - rootR.left, top: curR.top  - rootR.top,  width: curR.width,  height: curR.height};
  const anim = document.createElement('div');
  anim.className = 'enlarge-closing';
  anim.style.cssText = `position:absolute;left:${overlRel.left}px;top:${overlRel.top}px;width:${overlRel.width}px;height:${overlRel.height}px;z-index:9999;border-radius:var(--enlarge-radius,24px);overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35);transition:all ${CFG.enlargeTransitionMs}ms ease-out;pointer-events:none;`;
  const oi = overlay.querySelector('img');
  if (oi) { const ci = oi.cloneNode(); ci.style.cssText='width:100%;height:100%;object-fit:cover;'; anim.appendChild(ci); }
  overlay.remove();
  rootEl.appendChild(anim);
  void anim.getBoundingClientRect();
  requestAnimationFrame(() => {
    anim.style.left    = origRel.left   + 'px';
    anim.style.top     = origRel.top    + 'px';
    anim.style.width   = origRel.width  + 'px';
    anim.style.height  = origRel.height + 'px';
    anim.style.opacity = '0';
  });
  const cleanup = () => {
    anim.remove();
    originalTilePos = null;
    if (refDiv) refDiv.remove();
    parent.style.transition = 'none';
    el.style.transition = 'none';
    parent.style.setProperty('--rot-y-delta', '0deg');
    parent.style.setProperty('--rot-x-delta', '0deg');
    requestAnimationFrame(() => {
      el.style.visibility = ''; el.style.opacity = '0'; el.style.zIndex = 0;
      focusedEl = null;
      rootEl.removeAttribute('data-enlarging');
      requestAnimationFrame(() => {
        parent.style.transition = '';
        el.style.transition = 'opacity 300ms ease-out';
        requestAnimationFrame(() => {
          el.style.opacity = '1';
          setTimeout(() => { el.style.transition = ''; el.style.opacity = ''; isOpening = false; }, 300);
        });
      });
    });
  };
  anim.addEventListener('transitionend', cleanup, {once: true});
}
</script>
</body>
